<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta name="description" content="Buxoro Maktabi - zamonaviy xususiy maktab." />

    <meta name="theme-color" content="#f5f9f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="Buxoro Maktabi" />
    <meta property="og:description" content="Buxoro Maktabi - zamonaviy xususiy maktab." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Buxoro Maktabi" />
    <meta name="twitter:description" content="Buxoro Maktabi - zamonaviy xususiy maktab." />
    <meta name="twitter:image" content="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Buxoro Maktabi",
      "description": "Buxorodagi zamonaviy xususiy maktab. 1-11 sinflar, sifatli ta'lim, professional jamoa.",
      "url": "https://buxoromaktabi.uz",
      "logo": "/logo.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bekobod",
        "addressRegion": "Toshkent viloyati",
        "addressCountry": "UZ"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+998-94-835-66-66",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://t.me/BM_Bekobod",
        "https://www.instagram.com/buxoro_maktabi_bekobod/"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading skeleton — React yuklanguncha ko'rinadi -->
      <div id="skeleton" style="position:fixed;inset:0;z-index:9999;background:#0a1a12;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s">
        <style>
          @keyframes sk-pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
          @keyframes sk-shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
          .sk-logo { width:80px;height:80px;border-radius:50%;background:linear-gradient(90deg,#1a3a2a 25%,#2a5a3a 50%,#1a3a2a 75%);background-size:200% 100%;animation:sk-shimmer 2s infinite;margin-bottom:24px }
          .sk-bar { height:14px;border-radius:8px;background:linear-gradient(90deg,#1a3a2a 25%,#2a5a3a 50%,#1a3a2a 75%);background-size:200% 100%;animation:sk-shimmer 2s infinite;margin-bottom:10px }
          .sk-bar:nth-child(1) { width:240px }
          .sk-bar:nth-child(2) { width:180px }
          .sk-bar:nth-child(3) { width:200px;margin-bottom:30px }
          .sk-dot { width:6px;height:6px;border-radius:50%;background:#059669;display:inline-block;margin:0 3px;animation:sk-pulse 1.5s infinite }
          .sk-dot:nth-child(2) { animation-delay:.3s }
          .sk-dot:nth-child(3) { animation-delay:.6s }
        </style>
        <div class="sk-logo"></div>
        <div class="sk-bar"></div>
        <div class="sk-bar"></div>
        <div class="sk-bar"></div>
        <div style="display:flex;align-items:center;gap:2px;font-size:13px;color:#059669;font-family:sans-serif">
          Buxoro Maktabi
          <span class="sk-dot"></span>
          <span class="sk-dot"></span>
          <span class="sk-dot"></span>
        </div>
      </div>
      <script>window.addEventListener('load',()=>{setTimeout(()=>{const s=document.getElementById('skeleton');if(s)s.style.opacity='0';setTimeout(()=>s?.remove(),500)},300)})</script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
