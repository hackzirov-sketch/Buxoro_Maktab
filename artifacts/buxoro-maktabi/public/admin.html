<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buxoro Maktabi Admin</title>
    <style>
      :root { color-scheme: dark; --bg:#04140c; --panel:rgba(255,255,255,.08); --line:rgba(255,255,255,.14); --muted:rgba(255,255,255,.62); --green:#22c55e; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: radial-gradient(circle at 20% 0%, rgba(34,197,94,.16), transparent 34rem), var(--bg); color: #fff; }
      main { width: min(1180px, calc(100% - 28px)); margin: 24px auto; }
      .top { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
      h1 { margin: 0 0 6px; font-size: clamp(24px, 4vw, 34px); }
      p { margin: 0; color: var(--muted); line-height: 1.5; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 16px; box-shadow: 0 24px 80px rgba(0,0,0,.28); }
      .controls { display: grid; grid-template-columns: 1.3fr .8fr .8fr auto auto auto; gap: 10px; align-items: end; }
      label { display: grid; gap: 7px; font-size: 12px; color: rgba(255,255,255,.72); }
      input, select { width: 100%; border-radius: 10px; border: 1px solid var(--line); background: rgba(0,0,0,.35); color: #fff; padding: 12px; font-size: 14px; outline: none; }
      button, a.btn { border: 0; border-radius: 10px; padding: 12px 14px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; white-space: nowrap; }
      button { background: var(--green); color: #04140c; }
      .ghost { background: rgba(255,255,255,.1); color: #fff; border: 1px solid var(--line); }
      .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
      .stat { padding: 13px; border-radius: 12px; background: rgba(0,0,0,.24); border: 1px solid rgba(255,255,255,.09); }
      .stat strong { display: block; font-size: 22px; }
      .stat span { color: var(--muted); font-size: 12px; }
      .table-wrap { overflow: auto; border-radius: 14px; border: 1px solid var(--line); }
      table { width: 100%; border-collapse: collapse; min-width: 980px; }
      th, td { padding: 11px 10px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: left; font-size: 13px; vertical-align: top; }
      th { position: sticky; top: 0; background: #092015; z-index: 1; color: rgba(255,255,255,.78); font-size: 12px; }
      tr:hover td { background: rgba(255,255,255,.04); }
      .badge { display: inline-flex; border-radius: 999px; padding: 4px 8px; font-size: 11px; font-weight: 700; background: rgba(34,197,94,.14); color: #86efac; }
      .badge.grant { background: rgba(250,204,21,.14); color: #fde68a; }
      .muted { color: var(--muted); }
      #out { margin-top: 12px; white-space: pre-wrap; color: rgba(255,255,255,.72); font-size: 13px; min-height: 20px; }
      @media (max-width: 820px) { .top { display: block; } .controls { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <div>
          <h1>Arizalar</h1>
          <p>O'qishga qabul va grant arizalarini ko'rish, filterlash va Excel uchun CSV yuklash.</p>
        </div>
        <a class="btn ghost" href="/">Saytga qaytish</a>
      </div>

      <section class="panel">
        <div class="controls">
          <label>Admin parol <input id="key" type="password" value="buxoro777admin" /></label>
          <label>Ariza turi
            <select id="type" onchange="render()">
              <option value="">Hammasi</option>
              <option value="study">O'qishga qabul</option>
              <option value="grant">Grant</option>
            </select>
          </label>
          <label>Qidirish <input id="search" type="search" placeholder="Ism, telefon, maktab..." oninput="render()" /></label>
          <button type="button" onclick="loadApplications()">Yangilash</button>
          <button type="button" class="ghost" onclick="downloadCsv()">CSV</button>
          <button type="button" class="ghost" onclick="checkHealth()">Server</button>
        </div>

        <div class="stats">
          <div class="stat"><strong id="total">0</strong><span>Jami</span></div>
          <div class="stat"><strong id="study">0</strong><span>O'qishga qabul</span></div>
          <div class="stat"><strong id="grant">0</strong><span>Grant</span></div>
          <div class="stat"><strong id="shown">0</strong><span>Ko'rsatilmoqda</span></div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Sana</th>
                <th>Turi</th>
                <th>Ota-ona</th>
                <th>Telefon</th>
                <th>Bola</th>
                <th>Maktab</th>
                <th>Sinflar</th>
                <th>Hudud</th>
              </tr>
            </thead>
            <tbody id="tbody"><tr><td colspan="9" class="muted">Arizalarni ko'rish uchun "Yangilash"ni bosing.</td></tr></tbody>
          </table>
        </div>
        <div id="out"></div>
      </section>
    </main>
    <script>
      let rows = [];
      const $ = (id) => document.getElementById(id);
      const key = () => encodeURIComponent($('key').value.trim());
      const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
      function downloadCsv() { location.href = '/api/applications.php?excel=1&key=' + key(); }
      async function loadApplications() {
        $('out').textContent = 'Yuklanmoqda...';
        const res = await fetch('/api/applications.php?list=1&key=' + key(), { cache: 'no-store' });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Arizalar yuklanmadi');
        rows = data.items || [];
        $('out').textContent = rows.length ? 'Arizalar yuklandi.' : 'Hozircha ariza yoq.';
        render();
      }
      async function checkHealth() {
        $('out').textContent = 'Tekshirilmoqda...';
        const res = await fetch('/api/applications.php?health=1', { cache: 'no-store' });
        $('out').textContent = JSON.stringify(await res.json(), null, 2);
      }
      function render() {
        const type = $('type').value;
        const q = $('search').value.trim().toLowerCase();
        const filtered = rows.filter((r) => {
          const matchesType = !type || (r.applicationType || 'study') === type;
          const haystack = [r.id, r.firstName, r.lastName, r.phone, r.childFirstName, r.childLastName, r.currentSchool, r.region].join(' ').toLowerCase();
          return matchesType && (!q || haystack.includes(q));
        });
        $('total').textContent = rows.length;
        $('study').textContent = rows.filter((r) => (r.applicationType || 'study') === 'study').length;
        $('grant').textContent = rows.filter((r) => r.applicationType === 'grant').length;
        $('shown').textContent = filtered.length;
        $('tbody').innerHTML = filtered.length ? filtered.map((r) => {
          const isGrant = r.applicationType === 'grant';
          return `<tr>
            <td><strong>${esc(r.id || '')}</strong></td>
            <td>${esc(r.createdAt || '')}</td>
            <td><span class="badge ${isGrant ? 'grant' : ''}">${esc(r.applicationTypeLabel || (isGrant ? 'Grant' : "O'qishga qabul"))}</span></td>
            <td>${esc((r.firstName || '') + ' ' + (r.lastName || ''))}</td>
            <td><a href="tel:${esc(r.phone || '')}" class="muted">${esc(r.phone || '')}</a></td>
            <td>${esc((r.childFirstName || '') + ' ' + (r.childLastName || ''))}</td>
            <td>${esc(r.currentSchool || '')}</td>
            <td>${esc(r.graduatedClass || '')}-sinf -> ${esc(r.applyingClass || '')}-sinf</td>
            <td>${esc(r.region || '')}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="9" class="muted">Mos ariza topilmadi.</td></tr>';
      }
      window.addEventListener('DOMContentLoaded', () => {
        loadApplications().catch((err) => $('out').textContent = err.message);
      });
    </script>
  </body>
</html>
