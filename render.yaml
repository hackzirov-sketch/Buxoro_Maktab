services:
  - type: web
    name: buxoro-maktabi
    runtime: static
    branch: main
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm run typecheck:libs && corepack pnpm --filter @workspace/buxoro-maktabi run typecheck && corepack pnpm --filter @workspace/buxoro-maktabi run build
    staticPublishPath: artifacts/buxoro-maktabi/dist
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
