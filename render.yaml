services:
  - type: static
    name: buxoro-maktabi
    repo: https://github.com/hackzirov-sketch/Buxoro_Maktab
    branch: main
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install && pnpm --filter @workspace/buxoro-maktabi run build
    staticPublishPath: artifacts/buxoro-maktabi/dist
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
